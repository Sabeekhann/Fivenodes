<!-- COOKIE BANNER -->
<div id="cookie-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#0D0F1C;border-top:1px solid #1E2035;padding:1rem 1.5rem;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;font-family:'Inter',sans-serif;font-size:.85rem;color:#8B8FA8">
  <span>We use cookies to improve your experience. <a href="/legal/cookies/" style="color:#C8F135;text-decoration:none">Learn more</a></span>
  <div style="display:flex;gap:.75rem">
    <button onclick="dismissCookie(false)" style="background:transparent;border:1px solid #1E2035;color:#8B8FA8;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem">Decline</button>
    <button onclick="dismissCookie(true)" style="background:#C8F135;border:none;color:#05060E;padding:.5rem 1.25rem;border-radius:6px;cursor:pointer;font-weight:700;font-size:.85rem">Accept</button>
  </div>
</div>
<!-- WHATSAPP BUTTON -->
<script>
(function(){
  var b=document.getElementById('cookie-banner');
  if(b&&!localStorage.getItem('fn_cookie_choice')){b.style.display='flex'}
})();
function dismissCookie(accepted){
  localStorage.setItem('fn_cookie_choice',accepted?'accepted':'declined');
  var b=document.getElementById('cookie-banner');
  if(b)b.style.display='none';
}
</script>
